name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $json = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"
          Write-Host "Version set to: $version"

      - name: Validate updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "GitHub secret TAURI_SIGNING_PRIVATE_KEY is empty or missing. Generate an unpassworded Tauri signer key and store the private key file content as this secret."
          }
          if ($env:TAURI_SIGNING_PRIVATE_KEY -match "-----BEGIN|untrusted comment|\s") {
            throw "TAURI_SIGNING_PRIVATE_KEY must be the single-line base64 content generated by 'tauri signer generate --ci -w <file>', not PEM text, public key text, or multiline minisign text."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: npm run tauri -- build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Generate updater manifest
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -match '^v') {
            $version = $env:GITHUB_REF_NAME -replace '^v',''
          } else {
            $version = node -e "console.log(require('./src-tauri/tauri.conf.json').version)"
          }
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $installer) {
            throw "NSIS installer was not generated."
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Updater signature file was not generated: $signaturePath"
          }

          $signature = (Get-Content $signaturePath -Raw).Trim()
          $assetUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$($installer.Name)"
          $platform = [ordered]@{
            url = $assetUrl
            signature = $signature
          }
          $manifest = [ordered]@{
            version = $version
            notes = "See release notes for $env:GITHUB_REF_NAME."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64-nsis" = $platform
              "windows-x86_64" = $platform
            }
          }

          $manifestPath = "src-tauri/target/release/bundle/nsis/latest.json"
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -Encoding utf8
          Write-Host "Generated updater manifest: $manifestPath"

      - name: Verify updater artifacts
        shell: pwsh
        run: |
          $latestJson = @(Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Filter "latest.json" -ErrorAction SilentlyContinue)
          $signatures = @(Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Filter "*.sig" -ErrorAction SilentlyContinue)

          if ($latestJson.Count -eq 0) {
            throw "Updater manifest latest.json was not generated. Check bundle.createUpdaterArtifacts and signing key."
          }

          if ($signatures.Count -eq 0) {
            throw "Updater signature files (*.sig) were not generated. Check TAURI_SIGNING_PRIVATE_KEY."
          }

          Write-Host "Updater manifests:"
          $latestJson | ForEach-Object { Write-Host " - $($_.FullName)" }
          Write-Host "Updater signatures:"
          $signatures | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PAI-windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/*/*.sig
            src-tauri/target/release/bundle/*/latest.json
            src-tauri/target/release/*.exe
          if-no-files-found: error

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $releaseNotes = "docs/releases/${env:GITHUB_REF_NAME}.md"
          if (Test-Path $releaseNotes) {
            "HAS_RELEASE_NOTES=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RELEASE_BODY_PATH=$releaseNotes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "HAS_RELEASE_NOTES=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Create GitHub Release with custom notes
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_NOTES == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_BODY_PATH }}
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/*/*.sig
            src-tauri/target/release/bundle/*/latest.json
            src-tauri/target/release/*.exe

      - name: Create GitHub Release with generated notes
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_NOTES != 'true'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/*/*.sig
            src-tauri/target/release/bundle/*/latest.json
            src-tauri/target/release/*.exe
          generate_release_notes: true
