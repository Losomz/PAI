name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Write updater signing key
        shell: pwsh
        run: |
          Set-Content -Path "src-tauri/pai-update-private.key" -Value $env:TAURI_SIGNING_PRIVATE_KEY -NoNewline
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: src-tauri/pai-update-private.key

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PAI-windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
          if-no-files-found: error

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $releaseNotes = "docs/releases/${env:GITHUB_REF_NAME}.md"
          if (Test-Path $releaseNotes) {
            "HAS_RELEASE_NOTES=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RELEASE_BODY_PATH=$releaseNotes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "HAS_RELEASE_NOTES=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Create GitHub Release with custom notes
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_NOTES == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_BODY_PATH }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/*/latest.json

      - name: Create GitHub Release with generated notes
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_NOTES != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/*/latest.json
          generate_release_notes: true
